name: Build and Publish Container
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Set up Magic Nix Cache
        uses: DeterminateSystems/flakehub-cache-action@main

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container with Nix
        run: nix build .#docker

      - name: Load and push image
        run: |
          IMAGE_NAME=$(docker load < result | grep "Loaded image:" | awk '{print $NF}')
          REPO_NAME="${{ github.repository }}"
          REPO_NAME=${REPO_NAME,,}
          docker tag "$IMAGE_NAME" ghcr.io/$REPO_NAME:${{ github.sha }}
          docker tag "$IMAGE_NAME" ghcr.io/$REPO_NAME:latest
          docker push ghcr.io/$REPO_NAME:${{ github.sha }}
          docker push ghcr.io/$REPO_NAME:latest
